services:
  - type: web
    name: fssp-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: PORT
        value: 8081
